desc: "Sold-to identity used for business verification. \\*\\*Data classification — Personally Identifiable Information (PII):\\*\\* This model carries customer/contact PII (names, email, phone, postal address). Producers (service code paths populating SoldTo) and consumers (anything emitting it to logs / telemetry) MUST treat individual field values as PII and avoid clear-text logging. BillingTrust's existing runtime discipline keeps SoldTo out of Geneva logs (see \\`Services/Rpaas/RpaasRuleProjector.cs\\` — raw bodies and parsed error messages are filtered before emission). Downstream consumers of the public OpenAPI surface should follow the same convention. Tracked for follow-up alignment with ARM ARG002 (control-plane PII guidance) — see PR description."
