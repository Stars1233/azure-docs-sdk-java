type: "class"
desc: "The action an egress rule takes when it matches. - Allow/Deny: no additional fields needed; headers and rewrite must not be set. - Transform: headers is required with at least one entry; rewrite must not be set. - Rewrite: rewrite is required with at least one of scheme/host/path; headers is optional for injecting headers alongside the redirect."
