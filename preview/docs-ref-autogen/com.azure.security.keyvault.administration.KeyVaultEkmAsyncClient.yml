desc: "The <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> provides asynchronous methods to manage External Key Manager (EKM) connections\n\n## Getting Started ##\n\nIn order to interact with the Azure Key Vault service, you will need to create an instance of the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> class, a vault url and a credential object.\n\nThe examples shown in this document use a credential object named DefaultAzureCredential for authentication, which is appropriate for most scenarios, including local development and production environments. Additionally, we recommend using a [ managed identity][managed identity] for authentication in production environments. You can find more information on different ways of authenticating and their corresponding credential types in the [ Azure Identity documentation\"][Azure Identity documentation].\n\n**Sample: Construct Asynchronous EKM Client**\n\nThe following code sample demonstrates the creation of a <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref>, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClientBuilder\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClientBuilder\"></xref> to configure it.\n\n```java\nKeyVaultEkmAsyncClient keyVaultEkmAsyncClient = new KeyVaultEkmClientBuilder()\n     .vaultUrl(\"<your-managed-hsm-url>\")\n     .credential(new DefaultAzureCredentialBuilder().build())\n     .buildAsyncClient();\n```\n\n\n--------------------\n\n## Get an EKM Connection ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to retrieve the EKM connection from the key vault.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously retrieve the EKM connection from the key vault, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.getEkmConnection()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#getEkmConnection()\"></xref> API.\n\n```java\nkeyVaultEkmAsyncClient.getEkmConnection()\n     .subscribe(ekmConnection ->\n         System.out.printf(\"Retrieved EKM connection with host '%s'.%n\", ekmConnection.getHost()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n--------------------\n\n## Create an EKM Connection ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to create an EKM connection in the key vault.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously create an EKM connection in the key vault, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.createEkmConnection(com.azure.security.keyvault.administration.models.KeyVaultEkmConnection)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#createEkmConnection(KeyVaultEkmConnection)\"></xref> API.\n\n```java\nKeyVaultEkmConnection ekmConnectionToCreate =\n     new KeyVaultEkmConnection(\"<ekm-proxy-host>\",\n         Collections.singletonList(\"<server-ca-certificate>\".getBytes()))\n         .setPathPrefix(\"<path-prefix>\")\n         .setServerSubjectCommonName(\"<server-subject-common-name>\");\n\n keyVaultEkmAsyncClient.createEkmConnection(ekmConnectionToCreate)\n     .subscribe(createdEkmConnection ->\n         System.out.printf(\"Created EKM connection with host '%s'.%n\", createdEkmConnection.getHost()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n--------------------\n\n## Update an EKM Connection ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to update an existing EKM connection in the key vault.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously update an EKM connection in the key vault, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.updateEkmConnection(com.azure.security.keyvault.administration.models.KeyVaultEkmConnection)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#updateEkmConnection(KeyVaultEkmConnection)\"></xref> API.\n\n```java\nKeyVaultEkmConnection ekmConnectionToUpdate =\n     new KeyVaultEkmConnection(\"<ekm-proxy-host>\",\n         Collections.singletonList(\"<server-ca-certificate>\".getBytes()))\n         .setPathPrefix(\"<path-prefix>\")\n         .setServerSubjectCommonName(\"<server-subject-common-name>\");\n\n keyVaultEkmAsyncClient.updateEkmConnection(ekmConnectionToUpdate)\n     .subscribe(updatedEkmConnection ->\n         System.out.printf(\"Updated EKM connection with host '%s'.%n\", updatedEkmConnection.getHost()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n--------------------\n\n## Delete an EKM Connection ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to delete the EKM connection from the key vault.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously delete the EKM connection from the key vault, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.deleteEkmConnection()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#deleteEkmConnection()\"></xref> API.\n\n```java\nkeyVaultEkmAsyncClient.deleteEkmConnection()\n     .subscribe(deletedEkmConnection ->\n         System.out.printf(\"Deleted EKM connection with host '%s'.%n\", deletedEkmConnection.getHost()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n--------------------\n\n## Check an EKM Connection ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to check the connectivity and authentication with the EKM proxy.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously check the EKM connection, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.checkEkmConnection()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#checkEkmConnection()\"></xref> API.\n\n```java\nkeyVaultEkmAsyncClient.checkEkmConnection()\n     .subscribe(ekmProxyInfo ->\n         System.out.printf(\"Checked EKM connection. Proxy vendor: '%s', proxy name: '%s'.%n\",\n             ekmProxyInfo.getProxyVendor(), ekmProxyInfo.getProxyName()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n--------------------\n\n## Get the EKM Proxy Client Certificate ##\n\nThe <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient\"></xref> can be used to retrieve the EKM proxy client certificate from the key vault.\n\n**Code Sample:**\n\nThe following code sample demonstrates how to asynchronously retrieve the EKM proxy client certificate, using the <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmAsyncClient.getEkmCertificate()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmAsyncClient#getEkmCertificate()\"></xref> API.\n\n```java\nkeyVaultEkmAsyncClient.getEkmCertificate()\n     .subscribe(certificateInfo ->\n         System.out.printf(\"Retrieved EKM proxy client certificate with subject common name '%s'.%n\",\n             certificateInfo.getSubjectCommonName()));\n```\n\n**Note:** For the synchronous sample, refer to <xref uid=\"com.azure.security.keyvault.administration.KeyVaultEkmClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyVaultEkmClient\"></xref>.\n\n\n[managed identity]: https://learn.microsoft.com/azure/active-directory/managed-identities-azure-resources/\n[Azure Identity documentation]: https://learn.microsoft.com/java/api/overview/azure/identity-readme?view=azure-java-stable"
