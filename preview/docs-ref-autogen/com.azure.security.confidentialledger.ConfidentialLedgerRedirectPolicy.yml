desc: "A redirect policy for Confidential Ledger that preserves the Authorization header on trusted redirects while enforcing a strict redirect destination policy.\n\nThe Confidential Ledger service uses a distributed network of nodes. Write operations (POST) may be redirected from the load-balanced endpoint to a specific node via HTTP 307/308 redirects. The standard <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RedirectPolicy\"></xref> in azure-core strips the Authorization header on redirect for security, and only allows GET/HEAD methods by default. This policy addresses both issues for Confidential Ledger by:\n\n *  Following redirects for all HTTP methods including POST\n *  Preserving the Authorization header when the redirect target is a trusted Confidential Ledger destination\n\n**Redirect destination policy.** A redirect is only followed when the target uses the same scheme and the target host is the original ledger host or one of its subdomains (e.g., `accledger-2.myledger.confidential-ledger.azure.com` is a subdomain of `myledger.confidential-ledger.azure.com`). The host comparison is case-insensitive and ignores the port. Redirects to sibling ledgers, parent domains, unrelated hosts, or look-alike suffix domains are refused: they are logged at the warning level and never followed, so the sensitive Authorization header is never forwarded to an unintended destination. This prevents a misconfigured or malicious load balancer from redirecting a request — along with its sensitive headers — to a destination outside the original ledger.\n\nThis class is intended to be used internally by the Confidential Ledger client builders."
