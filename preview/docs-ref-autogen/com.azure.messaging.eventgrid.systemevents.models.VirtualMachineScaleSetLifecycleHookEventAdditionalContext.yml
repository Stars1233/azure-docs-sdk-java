type: "class"
desc: "Additional key-value pairs set on the Lifecycle Hook event that gives customer some useful context/data. The keys in this dictionary are specific to the Lifecycle Hook type. Different Lifecycle Hook events can have different sets of keys in the additional context depending on the Lifecycle Hook type. For example, for a Lifecycle Hook event with UpgradeAutoOSScheduling type, the additional context can contain the key \"priority\" that helps customer identify the priority of the Auto OS Upgrade operation triggered on the Virtual Machine Scale Set."
