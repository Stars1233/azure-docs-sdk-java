desc: "Response from \\`getSignalRecommendations\\` containing two independent suggestion streams for the Azure resource type represented by the target Entity. \\`recommendedSignals\\` lists signals broadly recommended to be enabled by default; \\`recommendedConfigurations\\` lists additional metrics that are not broadly applicable but, if a caller chooses to monitor one of them, ship with suggested starting-point thresholds. The two arrays are independent — items are not paired by index, and callers should treat them as two separate suggestion streams."
