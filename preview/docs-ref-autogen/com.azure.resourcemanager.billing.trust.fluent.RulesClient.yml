  syntax: "public abstract RuleInner update(String resourceUri, String ruleName, RulePatchProperties properties)"
  desc: "Update a Rule. The PATCH body is discriminated by \\`kind\\` and must match the existing rule's kind. For \\`eduQualification\\` rules, only \\`supplementalDocuments\\` is patchable, and only when \\`evaluationState == actionRequired\\`. For \\`businessVerification\\` rules, the patchable fields are \\`supplementalDocuments\\` and \\`externalId\\`, and only when \\`evaluationState\\` is \\`pending\\` or \\`actionRequired\\`. All other field/state combinations are rejected with 400 InvalidParameterValue or 409 RuleNotActionable."
  returns:
    description: "a rule within an assessment."
