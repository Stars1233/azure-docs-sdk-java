type: "class"
desc: "The match criteria for an egress rule. If both host and path are omitted, the rule matches all traffic. Host uses DNS wildcard syntax (e.g., \"\\*.openai.com\" matches \"api.openai.com\"). Path uses URI prefix matching with '\\*' as a single-segment wildcard (e.g., \"/v1/\\*\" matches \"/v1/chat\")."
