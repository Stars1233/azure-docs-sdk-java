type: "class"
desc: "Represents the configurable options to register an external key with Azure Key Vault Managed HSM.\n\nAn external key references key material that is owned by an external Hardware Security Module (HSM). Unlike other key types, an external key does not have a <xref uid=\"com.azure.security.keyvault.keys.models.KeyType\" data-throw-if-not-resolved=\"false\" data-raw-source=\"key type\"></xref>; the material is managed by the external HSM and the Managed HSM stores only a reference to it. External keys are mutually exclusive with a key type, so use <xref uid=\"com.azure.security.keyvault.keys.KeyClient.createExternalKey(com.azure.security.keyvault.keys.models.CreateExternalKeyOptions)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyClient#createExternalKey(CreateExternalKeyOptions)\"></xref> (or its asynchronous equivalent <xref uid=\"com.azure.security.keyvault.keys.KeyAsyncClient.createExternalKey(com.azure.security.keyvault.keys.models.CreateExternalKeyOptions)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"KeyAsyncClient#createExternalKey(CreateExternalKeyOptions)\"></xref>) rather than the standard create key operations.\n\nExternal keys are only supported on Managed HSM configured to use External Key Management (EKM), with service version `2026-01-01-preview` or newer. They are not supported on a standard Key Vault."
metadata: {}
