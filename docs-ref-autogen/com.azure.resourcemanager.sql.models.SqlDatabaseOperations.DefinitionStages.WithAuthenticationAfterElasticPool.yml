  syntax: "public default SqlDatabaseOperations.DefinitionStages.WithCreateAfterElasticPoolOptions withManagedIdentity(String managedIdentityResourceId)"
  desc: "Specifies the user-assigned managed identity (UAMI) used to authenticate to the SQL database for import.\n\nThe SQL server must have the specified UAMI assigned (and typically set as its primary identity), the UAMI must be granted the appropriate role on the source storage account (e.g. `Storage Blob Data Contributor`), and it must be mapped to a database user with the required privileges. When this method is used, no administrator password is sent to the service.\n\nThis method is for user-assigned managed identity. System-assigned managed identity is not supported. See [Limitations][]\n\n\n[Limitations]: https://learn.microsoft.com/azure/azure-sql/database/database-import-export-managed-identity?view=azuresql&tabs=azure-portal#limitations"
