  syntax: "public Response<BinaryData> getSessionLogStreamWithResponse(String agentName, String agentVersion, String sessionId, RequestOptions requestOptions)"
  desc: "Stream console logs for a hosted agent session Streams console logs (stdout / stderr) for a specific hosted agent session as a Server-Sent Events (SSE) stream. Each SSE frame contains: - \\`event\\`: always \\`\"log\"\\` - \\`data\\`: a plain-text log line (currently JSON-formatted, but the schema is not contractual and may include additional keys or change format over time — clients should treat it as an opaque string) Example SSE frames: \\`\\`\\` event: log data: \\{\"timestamp\":\"2026-03-10T09:33:17.121Z\",\"stream\":\"stdout\",\"message\":\"Starting FoundryCBAgent server on port 8088\"\\} event: log data: \\{\"timestamp\":\"2026-03-10T09:33:17.130Z\",\"stream\":\"stderr\",\"message\":\"INFO: Application startup complete.\"\\} event: log data: \\{\"timestamp\":\"2026-03-10T09:34:52.714Z\",\"stream\":\"status\",\"message\":\"Successfully connected to container\"\\} event: log data: \\{\"timestamp\":\"2026-03-10T09:35:52.714Z\",\"stream\":\"status\",\"message\":\"No logs since last 60 seconds\"\\} \\`\\`\\` The stream remains open until the client disconnects or the server terminates the connection. Clients should handle reconnection as needed.\n\n**Response Body Schema**\n\n```java\n{\n     event: String(log) (Required)\n     data: String (Required)\n }\n```"
  returns:
    description: "a single Server-Sent Event frame emitted by the hosted agent session log stream.\n\n Each frame contains an `event` field identifying the event type and a `data`\n field carrying the payload as plain text along with <xref uid=\"com.azure.core.http.rest.Response\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Response\"></xref>."
    type: "<xref href=\"com.azure.core.http.rest.Response?alt=com.azure.core.http.rest.Response&text=Response\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.azure.core.util.BinaryData?alt=com.azure.core.util.BinaryData&text=BinaryData\" data-throw-if-not-resolved=\"False\" />&gt;"
