  syntax: "public default SqlDatabase.DefinitionStages.WithAttachAllOptions<ParentT> withManagedIdentity(String managedIdentityResourceId)"
  desc: "Specifies the user-assigned managed identity (UAMI) used to authenticate to the SQL database for import.\n\nThe SQL server must have the specified UAMI assigned (and typically set as its primary identity), the UAMI must be granted the appropriate role on the source storage account (e.g. `Storage Blob Data Contributor`), and it must be mapped to a database user with the required privileges. When this method is used, no administrator password is sent to the service.\n\nThis method is for user-assigned managed identity. To use the server's system-assigned managed identity, enable SAMI on the server and pass the SAMI's resource identifier as well. The signed-in user's object ID is not a managed identity and cannot be used here."
  returns:
    description: "next definition stage"
    type: "<xref href=\"com.azure.resourcemanager.sql.models.SqlDatabase.DefinitionStages.WithAttachAllOptions?alt=com.azure.resourcemanager.sql.models.SqlDatabase.DefinitionStages.WithAttachAllOptions&text=WithAttachAllOptions\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"ParentT?alt=ParentT&text=ParentT\" data-throw-if-not-resolved=\"False\" />&gt;"
