  summary: "Builds an asynchronous beta Agents client for preview agent optimization operations."
  syntax: "public BetaAgentsAsyncClient buildBetaAgentsAsyncClient()"
  desc: "Builds an asynchronous beta Agents client for preview agent optimization operations.\n\nThe client is created using the endpoint, credential, pipeline, policies, and other configuration set on the enclosing <xref uid=\"com.azure.ai.agents.AgentsClientBuilder\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AgentsClientBuilder\"></xref>. Requests made by the client automatically include the `Foundry-Features` header required for beta agent operations, so <xref uid=\"com.azure.ai.agents.AgentsClientBuilder.allowPreview(boolean)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AgentsClientBuilder#allowPreview(boolean)\"></xref> does not need to be enabled."
