desc: "A sub-builder for creating beta Agents service clients.\n\nInstances are created by calling <xref uid=\"com.azure.ai.agents.AgentsClientBuilder.beta()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AgentsClientBuilder#beta()\"></xref>. Build methods on this class use the enclosing <xref uid=\"com.azure.ai.agents.AgentsClientBuilder\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AgentsClientBuilder\"></xref>'s configuration and automatically add the `Foundry-Features` header required by the beta service area they target."
