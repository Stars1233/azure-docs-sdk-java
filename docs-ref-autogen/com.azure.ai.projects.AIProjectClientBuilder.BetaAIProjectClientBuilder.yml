  summary: "Builds an asynchronous beta Datasets client for preview data generation job operations."
  syntax: "public BetaDatasetsAsyncClient buildBetaDatasetsAsyncClient()"
  desc: "Builds an asynchronous beta Datasets client for preview data generation job operations.\n\nThe client is created using the endpoint, credential, pipeline, policies, and other configuration set on the enclosing <xref uid=\"com.azure.ai.projects.AIProjectClientBuilder\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AIProjectClientBuilder\"></xref>. Requests made by the client automatically include the `Foundry-Features` header required for data generation jobs preview operations, so <xref uid=\"com.azure.ai.projects.AIProjectClientBuilder.allowPreview(boolean)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AIProjectClientBuilder#allowPreview(boolean)\"></xref> does not need to be enabled."
