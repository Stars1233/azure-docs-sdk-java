- uid: "com.azure.ai.agents.AgentsClientBuilder.beta()"
  fullName: "com.azure.ai.agents.AgentsClientBuilder.beta()"
  name: "beta()"
  nameWithType: "AgentsClientBuilder.beta()"
  summary: "Returns the sub-builder used to create beta clients for preview-only service areas."
  syntax: "public AgentsClientBuilder.BetaAgentsClientBuilder beta()"
  desc: "Returns the sub-builder used to create beta clients for preview-only service areas.\n\nThe returned builder uses the configuration set on this builder, including endpoint, credential, HTTP pipeline, policies, retry settings, logging options, client options, and service version. Use this method when you want to build a client whose type is prefixed with `Beta`, such as <xref uid=\"com.azure.ai.agents.BetaAgentsClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaAgentsClient\"></xref>, <xref uid=\"com.azure.ai.agents.BetaAgentsAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaAgentsAsyncClient\"></xref>, <xref uid=\"com.azure.ai.agents.BetaMemoryStoresClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaMemoryStoresClient\"></xref>, or <xref uid=\"com.azure.ai.agents.BetaMemoryStoresAsyncClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaMemoryStoresAsyncClient\"></xref>.\n\nClients created by this sub-builder automatically opt in to the preview service area they target by adding the required `Foundry-Features` header. Calling <xref uid=\"com.azure.ai.agents.AgentsClientBuilder.allowPreview(boolean)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#allowPreview(boolean)\"></xref> is not required for these clients; that setting only controls supported preview behavior on non-beta clients."
  returns:
    description: "a builder for creating beta Agents service clients."
    type: "<xref href=\"com.azure.ai.agents.AgentsClientBuilder.BetaAgentsClientBuilder?alt=com.azure.ai.agents.AgentsClientBuilder.BetaAgentsClientBuilder&text=BetaAgentsClientBuilder\" data-throw-if-not-resolved=\"False\" />"
