- uid: "com.azure.ai.projects.AIProjectClientBuilder.beta()"
  fullName: "com.azure.ai.projects.AIProjectClientBuilder.beta()"
  name: "beta()"
  nameWithType: "AIProjectClientBuilder.beta()"
  summary: "Returns the sub-builder used to create beta clients for preview-only service areas."
  syntax: "public AIProjectClientBuilder.BetaAIProjectClientBuilder beta()"
  desc: "Returns the sub-builder used to create beta clients for preview-only service areas.\n\nThe returned builder uses the configuration set on this builder, including endpoint, credential, HTTP pipeline, policies, retry settings, logging options, client options, and service version. Use this method when you want to build a client whose type is prefixed with `Beta`, such as <xref uid=\"com.azure.ai.projects.BetaModelsClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaModelsClient\"></xref>, <xref uid=\"com.azure.ai.projects.BetaRedTeamsClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaRedTeamsClient\"></xref>, <xref uid=\"com.azure.ai.projects.BetaDatasetsClient\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BetaDatasetsClient\"></xref>, or their async counterparts.\n\nClients created by this sub-builder automatically opt in to the preview service area they target by adding the required `Foundry-Features` header. Calling <xref uid=\"com.azure.ai.projects.AIProjectClientBuilder.allowPreview(boolean)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#allowPreview(boolean)\"></xref> is not required for these clients; that setting only controls supported preview behavior on non-beta clients."
  returns:
    description: "a builder for creating beta AI Projects service clients."
    type: "<xref href=\"com.azure.ai.projects.AIProjectClientBuilder.BetaAIProjectClientBuilder?alt=com.azure.ai.projects.AIProjectClientBuilder.BetaAIProjectClientBuilder&text=BetaAIProjectClientBuilder\" data-throw-if-not-resolved=\"False\" />"
