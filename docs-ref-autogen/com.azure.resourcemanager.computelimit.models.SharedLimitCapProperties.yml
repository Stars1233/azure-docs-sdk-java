  name: "isBoundedCap()"
  nameWithType: "SharedLimitCapProperties.isBoundedCap()"
  summary: "Get the is<wbr>Bounded<wbr>Cap property: Controls whether the service validates the aggregate cap against the group limit for the VM family."
  syntax: "public boolean isBoundedCap()"
  desc: "Get the isBoundedCap property: Controls whether the service validates the aggregate cap against the group limit for the VM family. SUM(caps) is the sum of all per-member overrides' cap values plus \\`defaultMemberCap\\` multiplied by the number of member subscriptions without an override. When true, the service rejects any configuration where SUM(caps) exceeds the group limit. When false, SUM(caps) is permitted to exceed the group limit. Enabling this flag is rejected if the current configuration already breaches the group limit; reduce caps first, then enable."
  returns:
    description: "the isBoundedCap value."
    type: "<xref href=\"boolean?alt=boolean&text=boolean\" data-throw-if-not-resolved=\"False\" />"
